version: "3.9"

services:
  x-auto-downloader:
    build: .
    container_name: x-auto-downloader
    ports:
      - "13003:8080"
    volumes:
      - /volume1/docker/x-auto-download/config:/config
      - /volume1/docker/x-auto-download/state:/state
      - /volume1/docker/x-auto-download/downloads:/downloads
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
    command: >
      sh -c "python -c 'from playwright.async_api import async_playwright' 2>/dev/null
      || python -m pip install --no-cache-dir -r /app/requirements.txt;
      python /app/x_auto_worker.py --config /config/config.json"
    restart: unless-stopped
